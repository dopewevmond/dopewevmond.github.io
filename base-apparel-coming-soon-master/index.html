<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Base Apparel coming soon page</title>

  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container-fluid">
    <div class="row d-lg-none">
      <div class="col-12">
        <img src="images/logo.svg" alt="logo" class="logo-mobile">
      </div>
    </div>

    <div class="row">
      <div class="col-12 col-lg-7 p-0 order-last order-lg-first left-side">
        <div id="wrapper">
          <img src="images/logo.svg" alt="logo desktop" class="d-none d-lg-block mb-5">

          <main>
            <h1> WE'RE<br> <span id="bold-heading"> COMING<br> SOON</span> </h1>
            <p class="py-md-3 pb-3">Hello fellow shoppers! We're currently building our new fashion store. Add your email below to stay up-to-date with announcements and our launch deals.</p>

            <div class="email-input">
              <input type="text" placeholder="Email Address" id="email" name="email" onkeyup="validateOnKeyDown()" onblur="validateForm()">
              <img src="images/icon-error.svg" alt="error icon" id="error-icon">
              <button id="submit-button" onclick="validateForm()"><img src="images/icon-arrow.svg" alt="arrow icon"></button>
            </div>

            <div id="error-message">
              Please provide a valid email
            </div>
          </main>
        </div>
      </div>
      <!-- end of column -->

      <div class="col-12 col-lg-5 p-0">
        <picture>
          <source media="(min-width: 1024px)" srcset="images/hero-desktop.jpg">
          <img src="images/hero-mobile.jpg" alt="woman">
        </picture>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
