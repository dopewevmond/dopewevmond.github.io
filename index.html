<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | IP Address Tracker</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="p__bg">
        <h1 class="text-center py-4 text-white">IP Address Tracker</h1>
        <div class="mx-auto d-block d-flex p__input-container">
            <input type="text" class="p__input" placeholder="Search for any IP Address or domain">
            <!-- <input type="submit" value=">"> -->
            <button type="submit" class="p__button"> > </button>
        </div>

        <div class="p__absolute container-fluid">
            <div class="p__container mt-4 bg-white text-center p__custom-box">
                <div class="py-4">
                    <div class="row">
                        <div class="col-12 col-md-6 col-lg-3 p__right-border my-lg-4">
                            <h3>IP ADDRESS</h3>
                            <p>192.212.174.101</p>
                        </div>
                        <div class="col-12 col-md-6 col-lg-3 p__right-border my-lg-4">
                            <h3>LOCATION</h3>
                            <p>Brooklyn, NY <br>10001</p>
                        </div>
                        <div class="col-12 col-md-6 col-lg-3 p__right-border my-lg-4">
                            <h3>TIMEZONE</h3>
                            <p>192.212.174.101</p>
                        </div>
                        <div class="col-12 col-md-6 col-lg-3 my-lg-4">
                            <h3>ISP</h3>
                            <p>SpaceX Starlink</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="p__map"></div>
</body>
</html>
